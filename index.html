<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── TOP NAV ─────────────────────────────────────────────── -->
  <header class="topnav" role="banner">
    <div class="topnav__inner">

      <!-- Logo -->
      <div class="topnav__logo" aria-label="TaskFlow">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="3" y="3" width="8" height="8" rx="2" fill="var(--accent)"/>
          <rect x="13" y="3" width="8" height="8" rx="2" fill="var(--accent)" opacity=".4"/>
          <rect x="3" y="13" width="8" height="8" rx="2" fill="var(--accent)" opacity=".4"/>
          <rect x="13" y="13" width="8" height="8" rx="2" fill="var(--accent)"/>
        </svg>
        <span class="logo-text">TaskFlow</span>
      </div>

      <!-- Stats -->
      <div class="topnav__stats" role="status" aria-live="polite" aria-atomic="true">
        <div class="stat">
          <span id="stat-total" class="stat__num">0</span>
          <span class="stat__label">total</span>
        </div>
        <div class="stat-divider" aria-hidden="true"></div>
        <div class="stat">
          <span id="stat-done" class="stat__num stat__num--green">0</span>
          <span class="stat__label">done</span>
        </div>
      </div>

      <!-- Action -->
      <div class="topnav__actions">
        <button id="clear-btn" class="btn-ghost-sm" aria-label="Clear all completed tasks">
          Clear done
        </button>
      </div>

    </div>

    <!-- Signature: completion progress bar -->
    <div class="progress-track" aria-hidden="true">
      <div id="progress-bar" class="progress-fill"></div>
    </div>
  </header>

  <!-- ── MAIN ────────────────────────────────────────────────── -->
  <main class="main" role="main">

    <!-- Input bar -->
    <section class="input-section" aria-label="Add a new task">
      <label for="task-input" class="sr-only">New task</label>
      <div class="input-bar">
        <svg class="input-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="10" cy="10" r="8.5" stroke="var(--border-strong)" stroke-width="1.5"/>
          <path d="M10 6.5v7M6.5 10h7" stroke="var(--border-strong)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input
          type="text"
          id="task-input"
          class="task-input"
          placeholder="Add a task — press Enter or click Add"
          maxlength="120"
          autocomplete="off"
          aria-describedby="error-msg"
        />
        <button id="add-btn" class="btn-add" aria-label="Add task">
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true" width="14" height="14">
            <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Add
        </button>
      </div>
      <p id="error-msg" class="error-msg" role="alert" aria-live="polite"></p>
    </section>

    <!-- Filters -->
    <nav class="filters" aria-label="Filter tasks">
      <button class="filter-pill active" data-filter="all">All</button>
      <button class="filter-pill" data-filter="active">Active</button>
      <button class="filter-pill" data-filter="completed">Completed</button>
    </nav>

    <!-- Task list -->
    <section class="list-section" aria-label="Task list">
      <ul id="task-list" class="task-list" aria-label="Your tasks"></ul>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state" hidden>
        <svg class="empty-svg" viewBox="0 0 80 80" fill="none" aria-hidden="true">
          <circle cx="40" cy="40" r="36" fill="var(--accent-light)"/>
          <path d="M25 40h30M25 31h20M25 49h15" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <p id="empty-title" class="empty-title">Nothing here yet</p>
        <p id="empty-sub"   class="empty-sub">Type a task above and press Enter to get started.</p>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
